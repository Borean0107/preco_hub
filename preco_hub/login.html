<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Preço-Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="login-body">

    <nav class="navbar navbar-expand-lg navbar-light navbar-profissional sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
                <img src="assets/img/logo/logo.png" alt="Preço-Hub" class="logo-navbar">
                <div class="brand-text">
                    <span class="brand-title">Preço-Hub</span>
                    <small class="brand-subtitle">Comparador inteligente de preços</small>
                </div>
            </a>
        </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center py-5 flex-grow-1">
        <div class="login-card shadow-sm w-100">
            <h2 class="text-center mb-2">Entrar</h2>
            <p class="text-center text-muted mb-4">
                Acesse sua conta para continuar suas compras.
            </p>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="Digite seu email"
                        required>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input
                        type="password"
                        class="form-control"
                        id="senha"
                        placeholder="Digite sua senha"
                        required>
                </div>

                <div id="mensagemLogin" class="alert d-none" role="alert"></div>

                <button type="submit" class="btn btn-login w-100">Entrar</button>
            </form>

            <div class="text-center mt-3">
                <a href="cadastro.html" class="voltar-link">Criar conta</a>
                <span class="mx-2">•</span>
                <a href="index.html" class="voltar-link">Voltar ao site</a>
            </div>
        </div>
    </main>

    <script src="assets/js/auth/login.js"></script>
</body>

</html>
