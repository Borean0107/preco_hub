<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pre�o-Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="login-body">
    <main class="login-wrapper">
        <div class="login-container">
            <div class="login-hero">
                <div class="brand-signature">
                    <img src="assets/img/logo/logo.png" alt="Preço-Hub" class="logo-login">
                    <div>
                        <span class="brand-title">Preço-Hub</span>
                        <small class="brand-subtitle">Comparador inteligente de preços</small>
                    </div>
                </div>

                <span class="login-badge">ACESSO SEGURO</span>
                <h1>Compare preços e<br><span class="highlight">economize melhor</span></h1>
                <p>Entre para pesquisar produtos, salvar listas e acompanhar os melhores valores.</p>
            </div>

            <div class="login-card shadow-sm">
                <h2>Entrar</h2>
                <p class="text-muted">Acesse sua conta para continuar.</p>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
                    </div>

                    <div id="mensagemLogin" class="alert d-none" role="alert"></div>

                    <button type="submit" class="btn btn-login w-100">Entrar</button>
                </form>

                <div class="login-actions text-center mt-4">
                    <a href="cadastro.html" class="voltar-link">Criar conta</a>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/auth/login.js"></script>
</body>

</html>
