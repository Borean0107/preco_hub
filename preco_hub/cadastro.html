<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Pre&ccedil;o-Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=20260508-cadastro-hero">
    <script src="assets/js/transicoes.js?v=20260507-opt1"></script>
</head>

<body class="login-body">

    <main class="login-wrapper">
        <div class="login-container">
            <div class="login-hero">
                <div class="brand-signature">
                    <img src="assets/img/logo/logo.png" alt="Pre&ccedil;o-Hub" class="logo-login">
                    <div>
                        <span class="brand-title">Pre&ccedil;o-Hub</span>
                        <small class="brand-subtitle">Comparador inteligente de pre&ccedil;os</small>
                    </div>
                </div>

                <span class="login-badge">CADASTRO SEGURO</span>
                <h1>Crie sua conta e<br><span class="highlight">economize melhor</span></h1>
            </div>

            <div class="login-card shadow-sm w-100">
                <h2>Criar conta</h2>
                <p class="text-muted">
                    Cadastre-se para salvar listas e organizar suas compras.
                </p>

                <form id="registerForm">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input
                            type="text"
                            class="form-control"
                            id="nome"
                            placeholder="Digite seu nome"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            placeholder="Digite seu email"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input
                            type="password"
                            class="form-control"
                            id="senha"
                            placeholder="Crie uma senha"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="confirmarSenha" class="form-label">Confirmar senha</label>
                        <input
                            type="password"
                            class="form-control"
                            id="confirmarSenha"
                            placeholder="Repita sua senha"
                            required>
                    </div>

                    <div id="mensagemCadastro" class="alert d-none" role="alert"></div>

                    <button type="submit" class="btn btn-login w-100">Cadastrar</button>
                </form>

                <div class="login-actions text-center mt-4">
                    <a href="index.html" class="voltar-link">Ja tenho conta</a>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/auth/cadastro.js?v=20260508-cadastro-hero"></script>
</body>

</html>
